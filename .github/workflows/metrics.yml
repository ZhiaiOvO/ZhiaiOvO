name: Metrics
on:
  schedule:
    - cron: "0 16 * * *"  # 每天凌晨 0 点（北京时间）
  workflow_dispatch:       # 支持手动触发
  push:
    branches: [main, master]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pinned Repositories (顶置仓库)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/repos.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: yes
          plugin_repositories_affiliations: owner
          config_timezone: Asia/Shanghai

      - name: Contribution Calendar (贡献热点图)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/calendar.svg
          base: ""
          plugin_calendar: yes
          plugin_calendar_full: yes
          config_timezone: Asia/Shanghai
